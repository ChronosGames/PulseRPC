name: IServiceHandler API Contract
version: 1.0.0
description: Contract for service handler implementations

interface:
  name: IServiceHandler
  methods:
    - name: InvokeAsync
      parameters:
        - name: methodName
          type: string
          required: true
          description: Name of the method to invoke
        - name: parameters
          type: ReadOnlyMemory<byte>
          required: true
          description: Serialized method parameters
        - name: context
          type: RequestContext
          required: true
          description: Request context with metadata and cancellation
      returns: ValueTask<ReadOnlyMemory<byte>>
      description: Invoke the specified service method
      contracts:
        - Must deserialize parameters from bytes
        - Must invoke the actual service method
        - Must serialize the return value to bytes
        - Must respect context.CancellationToken for timeout
        - Must throw OperationCanceledException if cancelled
        - Must throw MethodNotFoundException if method not found
        - Must propagate service method exceptions

    - name: GetMethodNames
      parameters: none
      returns: IReadOnlyList<string>
      description: Get list of available method names
      contracts:
        - Must return all public methods
        - Must be deterministic (same order each call)
        - Must complete synchronously

error_handling:
  - scenario: Method not found
    behavior: Throw MethodNotFoundException with method name

  - scenario: Deserialization failure
    behavior: Throw SerializationException with details

  - scenario: Service method throws exception
    behavior: Propagate exception to dispatcher for error response

  - scenario: Cancellation during execution
    behavior: Throw OperationCanceledException

  - scenario: Serialization of result fails
    behavior: Throw SerializationException with details

metadata_handling:
  - Context.Metadata must be passed to service method if it accepts it
  - Context.RequestId must be available for logging
  - Context.CancellationToken must be wired to async operations
