name: End-to-End Message Flow Contract
version: 1.0.0
description: |
  Defines the complete message flow from network ingress to egress,
  including all stages, data transformations, and error handling.

stages:
  1_reception:
    name: Message Reception
    input: Raw network bytes from TCP/KCP transport
    output: Parsed RpcMessage
    responsibilities:
      - Receive complete message from network buffer
      - Parse protocol header (version, type, requestId)
      - Extract service name, method name, payload
      - Validate message integrity (checksum, size limits)
    error_cases:
      - incomplete_message: Buffer remaining data, wait for completion
      - protocol_version_mismatch: Send protocol error response
      - payload_too_large: Send error response, optionally disconnect
      - corrupted_data: Send protocol error response

  2_dispatching:
    name: Message Dispatching
    input: Parsed RpcMessage
    output: ServiceRegistration + RequestContext
    responsibilities:
      - Lookup service by name in registry
      - Create RequestContext with correlation info
      - Assign priority based on message metadata
      - Queue for processing in appropriate priority queue
    error_cases:
      - service_not_found: Create error response immediately
      - queue_full: Apply backpressure or reject
      - service_paused: Create service unavailable error

  3_invocation:
    name: Service Invocation
    input: ServiceRegistration + RequestContext
    output: Method result or Exception
    responsibilities:
      - Invoke compiled service method delegate
      - Pass RequestContext to method
      - Enforce timeout via CancellationToken
      - Catch and isolate exceptions
    error_cases:
      - timeout_exceeded: Cancel operation, return timeout error
      - exception_thrown: Catch, serialize exception details
      - connection_lost: Cancel operation, cleanup resources

  4_response_generation:
    name: Response Generation
    input: Method result or Exception
    output: ResponseEnvelope
    responsibilities:
      - Serialize successful result to bytes
      - OR create error response from exception
      - Preserve RequestId for correlation
      - Record completion timestamp
    error_cases:
      - serialization_failure: Create error response about serialization
      - result_too_large: Create error response about size limit

  5_transmission:
    name: Response Transmission
    input: ResponseEnvelope
    output: Bytes written to network
    responsibilities:
      - Serialize response envelope to wire format
      - Write to connection socket (batched if possible)
      - Handle send failures with retry
      - Dispose buffers after send
    error_cases:
      - connection_closed: Drop response, cleanup
      - send_buffer_full: Queue for retry or drop
      - network_error: Retry limited times, then cleanup

performance_contracts:
  - stage: all
    metric: total_latency_p95
    target: < 5ms
    conditions: small payloads (<1KB), normal load (50% capacity)

  - stage: 1_reception
    metric: parsing_time
    target: < 100 microseconds per message

  - stage: 2_dispatching
    metric: lookup_time
    target: < 10 microseconds (dictionary lookup)

  - stage: 3_invocation
    metric: overhead
    target: < 50 microseconds (excluding service method time)

  - stage: 5_transmission
    metric: batching_delay
    target: < 1ms (for batching small responses)

reliability_contracts:
  - isolation: Exceptions in one stage must not affect other requests
  - cleanup: All resources released even on error paths
  - ordering: FIFO ordering maintained per connection
  - fairness: No single client can starve others

observability_contracts:
  - tracing: W3C Trace Context propagated through all stages
  - metrics: Latency histogram per stage
  - logging: Errors logged with full context (requestId, connectionId, stage)
