openapi: 3.0.3
info:
  title: PulseRPC 服务实例诊断 API
  version: 1.0.0
  description: |
    PulseRPC 服务器的服务实例健康监控和指标暴露端点。
    提供实时查询服务实例状态、线程分配、健康指标以及管理操作。

servers:
  - url: http://localhost:8080
    description: 本地开发服务器
  - url: https://api.example.com
    description: 生产环境服务器

paths:
  /diagnostics/metrics:
    get:
      summary: 获取服务实例指标
      description: 返回所有或过滤后的服务实例的运行时指标（JSON 格式）
      operationId: getMetrics
      tags:
        - Metrics
      parameters:
        - name: serviceName
          in: query
          description: 可选的服务类型名称过滤器（例如：ChatRoom）
          required: false
          schema:
            type: string
            example: ChatRoom
        - name: serviceId
          in: query
          description: 可选的服务实例 ID 过滤器（例如：ChatRoom:room-123）
          required: false
          schema:
            type: string
            example: ChatRoom:room-123
      responses:
        '200':
          description: 成功返回指标数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
              example:
                timestamp: '2025-10-21T12:00:00Z'
                activeInstances: 125
                totalThreads: 16
                instances:
                  - serviceName: ChatRoom
                    serviceId: ChatRoom:room-123
                    healthState: Healthy
                    totalRequests: 1000
                    successRate: 0.998
                    assignedThreadId: 5
                    lastActivityUtc: '2025-10-21T11:59:50Z'
        '400':
          description: 无效的查询参数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /diagnostics/health:
    get:
      summary: 获取服务实例健康状态汇总
      description: 返回服务器整体健康状态和服务实例统计信息
      operationId: getHealth
      tags:
        - Health
      responses:
        '200':
          description: 成功返回健康状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: Healthy
                totalInstances: 125
                healthyInstances: 120
                isolatedInstances: 3
                coolingDownInstances: 2
                details:
                  threadPoolUtilization: 0.78
                  queueDepth: 15
        '503':
          description: 服务不健康（超过 50% 实例被隔离）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /diagnostics/instances/{serviceId}:
    get:
      summary: 获取特定服务实例的详细信息
      description: 返回单个服务实例的完整健康和性能指标
      operationId: getInstanceDetails
      tags:
        - Instances
      parameters:
        - name: serviceId
          in: path
          description: 服务实例 ID
          required: true
          schema:
            type: string
            example: ChatRoom:room-123
      responses:
        '200':
          description: 成功返回实例详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstanceMetrics'
        '404':
          description: 服务实例不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /diagnostics/instances/{serviceId}/reset:
    post:
      summary: 手动重置服务实例健康状态
      description: |
        将被隔离的服务实例状态重置为 Healthy，清除故障计数器。
        需要管理员权限。
      operationId: resetInstanceHealth
      tags:
        - Management
      parameters:
        - name: serviceId
          in: path
          description: 服务实例 ID
          required: true
          schema:
            type: string
            example: ChatRoom:room-123
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Instance health reset successfully
                  previousState:
                    type: string
                    enum: [Healthy, Isolated, CoolingDown, ProbeAllowed]
                    example: Isolated
        '404':
          description: 服务实例不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 权限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    MetricsResponse:
      type: object
      description: 服务实例指标响应
      required:
        - timestamp
        - activeInstances
        - totalThreads
        - instances
      properties:
        timestamp:
          type: string
          format: date-time
          description: 指标采集时间戳（UTC）
          example: '2025-10-21T12:00:00Z'
        activeInstances:
          type: integer
          description: 当前活跃服务实例总数
          example: 125
        totalThreads:
          type: integer
          description: 工作线程总数
          example: 16
        instances:
          type: array
          description: 服务实例详细指标列表
          items:
            $ref: '#/components/schemas/InstanceMetrics'

    InstanceMetrics:
      type: object
      description: 单个服务实例的详细指标
      required:
        - serviceName
        - serviceId
        - healthState
        - totalRequests
        - successRate
        - assignedThreadId
        - lastActivityUtc
      properties:
        serviceName:
          type: string
          description: 服务类型名称
          example: ChatRoom
        serviceId:
          type: string
          description: 服务实例唯一标识符
          example: ChatRoom:room-123
        healthState:
          type: string
          description: 当前健康状态
          enum:
            - Healthy
            - Isolated
            - CoolingDown
            - ProbeAllowed
          example: Healthy
        totalRequests:
          type: integer
          format: int64
          description: 总请求数
          example: 1000
        successfulRequests:
          type: integer
          format: int64
          description: 成功请求数
          example: 998
        successRate:
          type: number
          format: double
          description: 成功率（0.0 到 1.0）
          minimum: 0
          maximum: 1
          example: 0.998
        consecutiveTimeouts:
          type: integer
          description: 连续超时次数
          example: 0
        assignedThreadId:
          type: integer
          description: 分配的工作线程 ID
          example: 5
        lastActivityUtc:
          type: string
          format: date-time
          description: 最后活动时间（UTC）
          example: '2025-10-21T11:59:50Z'
        coolingPeriodExpiresUtc:
          type: string
          format: date-time
          nullable: true
          description: 冷却期过期时间（UTC），仅在 Isolated 状态时有效
          example: '2025-10-21T12:01:00Z'
        probeRequestsAllowed:
          type: integer
          description: 探测窗口剩余允许的探测请求数
          example: 5

    HealthResponse:
      type: object
      description: 服务器健康状态汇总
      required:
        - status
        - totalInstances
        - healthyInstances
        - isolatedInstances
      properties:
        status:
          type: string
          description: 整体健康状态
          enum:
            - Healthy
            - Degraded
            - Unhealthy
          example: Healthy
        totalInstances:
          type: integer
          description: 总服务实例数
          example: 125
        healthyInstances:
          type: integer
          description: 健康状态的实例数
          example: 120
        isolatedInstances:
          type: integer
          description: 已隔离状态的实例数
          example: 3
        coolingDownInstances:
          type: integer
          description: 冷却中状态的实例数
          example: 2
        probeAllowedInstances:
          type: integer
          description: 探测允许状态的实例数
          example: 0
        details:
          type: object
          description: 额外的运行时详情
          properties:
            threadPoolUtilization:
              type: number
              format: double
              description: 线程池利用率（0.0 到 1.0）
              example: 0.78
            queueDepth:
              type: integer
              description: 当前队列深度（待处理工作项）
              example: 15
            averageLoadPerThread:
              type: number
              format: double
              description: 平均每线程负载（实例数）
              example: 7.8

    ErrorResponse:
      type: object
      description: 错误响应
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: 错误代码
          example: NotFound
        message:
          type: string
          description: 人类可读的错误消息
          example: Service instance not found
        details:
          type: string
          nullable: true
          description: 额外的错误详情
          example: ServiceId 'ChatRoom:room-999' does not exist

tags:
  - name: Metrics
    description: 服务实例指标查询
  - name: Health
    description: 健康状态检查
  - name: Instances
    description: 服务实例详细信息
  - name: Management
    description: 管理操作
