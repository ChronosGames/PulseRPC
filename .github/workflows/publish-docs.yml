name: Verify Documentation on Main

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'Directory.Build.props'
      - 'docs/**'
      - 'samples/HelloRPC/**'
      - 'src/PulseRPC.Client/README.md'
      - 'src/PulseRPC.Server/README.md'
      - '.github/scripts/verify-hello-rpc.sh'
      - '.github/scripts/verify-nuget-readmes.sh'
  workflow_dispatch:

jobs:
  verify:
    name: Verify HelloRPC docs and runtime
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - run: bash ./.github/scripts/verify-hello-rpc.sh
      - run: bash ./.github/scripts/verify-nuget-readmes.sh
