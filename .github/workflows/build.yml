name: Build

on:
  push:
    branches:
      - main
      - release/**
    tags:
      - "!*" # not a tag push
    paths-ignore:
      - '**.md'
      - .github/**
      - docs/**
  pull_request:
    branches:
      - main
      - release/**
    paths-ignore:
      - '**.md'
      - .github/**
      - docs/**

jobs:
  build-dotnet:
    name: "Build .NET projects"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - run: dotnet restore ./PulseRPC.sln
      - run: dotnet build -c Debug ./PulseRPC.sln --no-restore --warnaserror
      - run: dotnet build -c Release ./PulseRPC.sln --no-restore --warnaserror
      - name: Smoke transport and Actor concurrency benchmark
        run: >-
          dotnet run --project ./perf/BenchmarkApp/PulseRPC.Benchmark/PulseRPC.Benchmark.csproj
          -c Release --no-build -- architecture-baseline --smoke
          --output ./architecture-smoke.json
      # 收集构建产物供 Unity 使用
      - name: Collect build outputs
        run: |
          set -euo pipefail
          dotnet build -c Release ./src/PulseRPC.Client.SourceGenerator.Unity/PulseRPC.Client.SourceGenerator.Unity.csproj --warnaserror
          mkdir -p ./build-output
          cp ./src/PulseRPC.Abstractions/bin/Release/netstandard2.1/PulseRPC.Abstractions.dll ./build-output/
          cp ./src/PulseRPC.Shared/bin/Release/netstandard2.1/PulseRPC.Shared.dll ./build-output/
          cp ./src/PulseRPC.Client/.artifacts/bin/release_netstandard2.1/PulseRPC.Client.dll ./build-output/
          unity_generator=./src/PulseRPC.Client.SourceGenerator.Unity/bin/Release/netstandard2.0/PulseRPC.Client.SourceGenerator.dll
          if grep -a -q "Microsoft.CodeAnalysis.Workspaces" "$unity_generator"; then
            echo "Unity source generator must not depend on Microsoft.CodeAnalysis.Workspaces"
            exit 1
          fi
          cp "$unity_generator" ./build-output/
      - name: Build and verify reproducible Unity UPM tarball
        shell: pwsh
        run: ./scripts/build-unity-upm.ps1
      - name: Rebuild Unity UPM tarball and compare hashes
        shell: pwsh
        run: ./scripts/build-unity-upm.ps1 -SkipBuild -OutputDirectory artifacts/unity-upm-repro
      - name: Assert Unity UPM byte-for-byte reproducibility
        shell: bash
        run: cmp ./artifacts/unity-upm/*.tgz ./artifacts/unity-upm-repro/*.tgz
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: build-output
          path: ./build-output/
          retention-days: 1
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: unity-upm
          path: ./artifacts/unity-upm/
          retention-days: 1

  run-tests:
    name: "Run tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20
    env:
      PULSERPC_TEST_REDIS: localhost:6379,abortConnect=false,connectTimeout=5000
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - run: dotnet restore ./PulseRPC.sln
      - run: dotnet test ./tests/PulseRPC.Client.Tests/PulseRPC.Client.Tests.csproj -c Release --no-restore
      - run: dotnet test ./tests/PulseRPC.Server.Tests/PulseRPC.Server.Tests.csproj -c Release --no-restore
      - run: dotnet test ./tests/PulseRPC.SourceGenerator.Tests/PulseRPC.SourceGenerator.Tests.csproj -c Release --no-restore
      - name: Run Redis backplane tests against real Redis
        run: dotnet test ./tests/PulseRPC.Backplane.Redis.Tests/PulseRPC.Backplane.Redis.Tests.csproj -c Release --no-restore
      - name: Stress discovery membership tests (20 runs)
        run: |
          for run in $(seq 1 20); do
            echo "Discovery membership run ${run}/20"
            dotnet test ./tests/PulseRPC.Infrastructure.Tests/PulseRPC.Infrastructure.Tests.csproj \
              -c Release --no-restore --nologo --verbosity quiet
          done

  verify-packages:
    name: "Verify NuGet API baselines and package contents"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - run: dotnet restore ./PulseRPC.Packaging.slnf
      - run: dotnet pack -c Release ./PulseRPC.Packaging.slnf --no-restore -o ./publish --warnaserror
      - name: Verify all runtime packages contain README and public API baselines
        shell: bash
        run: |
          projects=(
            PulseRPC.Abstractions PulseRPC.Shared PulseRPC.Client PulseRPC.Server
            PulseRPC.Backplane.Redis PulseRPC.Infrastructure
            PulseRPC.Infrastructure.Consul PulseRPC.Infrastructure.Etcd
            PulseRPC.Infrastructure.Kubernetes
          )
          for project in "${projects[@]}"; do
            if [ -d "./src/${project}/PublicAPI" ]; then
              baseline_dirs=(
                "./src/${project}/PublicAPI/netstandard2.1"
                "./src/${project}/PublicAPI/net10.0"
              )
            else
              baseline_dirs=("./src/${project}")
            fi
            for baseline_dir in "${baseline_dirs[@]}"; do
              shipped="${baseline_dir}/PublicAPI.Shipped.txt"
              test -s "$shipped"
              test "$(grep -cv '^#nullable enable$' "$shipped")" -gt 0
              test -s "${baseline_dir}/PublicAPI.Unshipped.txt"
            done
            package=$(find ./publish -maxdepth 1 -name "${project}.*.nupkg" ! -name "*.snupkg" -print -quit)
            test -n "$package"
            unzip -Z1 "$package" | grep -Fx "README.md"
            unzip -p "$package" README.md | grep -F "samples/HelloRPC"
            if unzip -p "$package" README.md | grep -Eq "samples/(ChatApp|JwtAuthentication|HubFactoryExample|ServiceFactoryExample|JsonTranscoding)"; then
              echo "Package ${project} README advertises a competing quickstart path."
              exit 1
            fi
          done

          client_package=$(find ./publish -maxdepth 1 -name "PulseRPC.Client.*.nupkg" ! -name "*.snupkg" -print -quit)
          client_analyzer="analyzers/dotnet/roslyn4.3/cs/PulseRPC.Client.SourceGenerator.dll"
          unzip -Z1 "$client_package" | grep -Fx "$client_analyzer"
          cmp \
            <(unzip -p "$client_package" "$client_analyzer") \
            ./src/PulseRPC.Client.SourceGenerator.Unity/bin/Release/netstandard2.0/PulseRPC.Client.SourceGenerator.dll

  verify-samples:
    name: "Build maintained samples"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - name: Verify the HelloRPC golden path
        shell: bash
        run: bash ./.github/scripts/verify-hello-rpc.sh
      - run: dotnet build -c Release ./samples/ChatApp/ChatApp.Server/ChatApp.Server.csproj --warnaserror
      - run: dotnet build -c Release ./samples/JwtAuthentication/JwtAuthApp.Server/JwtAuthApp.Server.csproj --warnaserror
      - run: dotnet build -c Release ./samples/JwtAuthentication/JwtAuthApp.Client/JwtAuthApp.Client.csproj --warnaserror
      - run: dotnet build -c Release ./samples/HubFactoryExample/HubFactoryExample.csproj --warnaserror
      - run: dotnet build -c Release ./samples/ServiceFactoryExample/ServiceFactoryExample.csproj --warnaserror
      - run: dotnet build -c Release ./samples/JsonTranscoding/JsonTranscodingSample.Server/JsonTranscodingSample.Server.csproj --warnaserror


  build-unity:
    name: "Unity 2022.3 clean UPM import, generators, and TCP roundtrip"
    needs: [build-dotnet]
    if: ${{ (github.event_name == 'push' && github.repository_owner == 'ChronosGames') || startsWith(github.event.pull_request.head.label, 'ChronosGames:') }}
    strategy:
      matrix:
        unity: ["2022.3.62f3"]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: ChronosGames/Actions/.github/actions/download-artifact@main
        with:
          name: unity-upm
          path: ./artifacts/unity-upm/

      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main

      - name: Install the versioned tarball in the clean Unity project
        shell: bash
        run: |
          mkdir -p ./tests/PulseRPC.Client.Unity.Smoke/Packages
          cp ./artifacts/unity-upm/*.tgz ./tests/PulseRPC.Client.Unity.Smoke/Packages/PulseRPC.Client.Unity.tgz

      - name: Build and start the HelloRPC TCP server
        shell: bash
        run: |
          set -euo pipefail
          dotnet build -c Release ./samples/HelloRPC/HelloRPC.Server/HelloRPC.Server.csproj --nologo
          dotnet run --project ./samples/HelloRPC/HelloRPC.Server/HelloRPC.Server.csproj \
            -c Release --no-build >"$RUNNER_TEMP/pulserpc-unity-server.log" 2>&1 &
          echo $! >"$RUNNER_TEMP/pulserpc-unity-server.pid"
          for attempt in $(seq 1 30); do
            if grep -q "HelloRPC server ready" "$RUNNER_TEMP/pulserpc-unity-server.log"; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/pulserpc-unity-server.log"
          exit 1

      - name: Import UPM tarball, load generators, and run TCP smoke
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_LICENSE == '' && secrets.UNITY_SERIAL || '' }}
        with:
          projectPath: tests/PulseRPC.Client.Unity.Smoke
          unityVersion: ${{ matrix.unity }}
          targetPlatform: StandaloneLinux64
          buildMethod: PulseRPC.UnityPackageSmoke.UnityPackageSmokeCi.Run
          useHostNetwork: true

      - name: Verify TCP smoke result
        shell: bash
        run: grep -Fx "PulseRPC Unity UPM TCP roundtrip passed." ./tests/PulseRPC.Client.Unity.Smoke/unity-package-smoke.txt

      - name: Stop the HelloRPC TCP server
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/pulserpc-unity-server.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/pulserpc-unity-server.pid")" || true
          fi

      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        if: failure()
        with:
          name: unity-upm-smoke-diagnostics
          path: |
            ./tests/PulseRPC.Client.Unity.Smoke/Logs/
            ${{ runner.temp }}/pulserpc-unity-server.log
          retention-days: 1

  build-unity-ios-il2cpp:
    name: "Unity 2022.3 iOS IL2CPP AOT"
    needs: [build-dotnet]
    if: ${{ (github.event_name == 'push' && github.repository_owner == 'ChronosGames') || startsWith(github.event.pull_request.head.label, 'ChronosGames:') }}
    runs-on: macos-15
    timeout-minutes: 60
    env:
      UNITY_IOS_BUILD_PATH: ${{ github.workspace }}/src/PulseRPC.Client.Unity/Builds/iOS
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main

      - name: Create Unity local package structure
        shell: bash
        run: |
          set -euo pipefail
          dotnet build -c Debug ./src/PulseRPC.Client/PulseRPC.Client.csproj -f netstandard2.1
          test -f ./src/PulseRPC.Client/.artifacts/bin/debug_netstandard2.1/package.json

      - uses: ChronosGames/Actions/.github/actions/download-artifact@main
        with:
          name: build-output
          path: ./build-output/

      - name: Install deterministic Unity assemblies
        shell: bash
        run: |
          set -euo pipefail
          plugins=./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins
          mkdir -p "$plugins"
          cp ./build-output/PulseRPC.Abstractions.dll "$plugins/"
          cp ./build-output/PulseRPC.Shared.dll "$plugins/"
          cp ./build-output/PulseRPC.Client.dll "$plugins/"
          cp ./build-output/PulseRPC.Client.SourceGenerator.dll "$plugins/"

      - name: Build Unity iOS player with IL2CPP and high stripping
        uses: ChronosGames/Actions/.github/actions/unity-builder@main
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_LICENSE == '' && secrets.UNITY_SERIAL || '' }}
        with:
          projectPath: src/PulseRPC.Client.Unity
          unityVersion: 2022.3.62f3
          targetPlatform: iOS
          buildMethod: Il2CppAotCi.BuildIos

      - name: Verify generated Hub, Receiver, and MemoryPack AOT roots
        shell: bash
        run: |
          set -euo pipefail
          test -d "$UNITY_IOS_BUILD_PATH"

          assert_cpp_symbol() {
            local symbol="$1"
            local matches
            matches=$(find "$UNITY_IOS_BUILD_PATH" -type f \
              \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.mm' \) \
              -exec grep -F -l "$symbol" {} +)
            if [ -z "$matches" ]; then
              echo "Missing IL2CPP symbol: $symbol"
              exit 1
            fi
          }

          assert_cpp_symbol "IIl2CppAotHubStub"
          assert_cpp_symbol "Il2CppAotReceiverDispatcher"
          assert_cpp_symbol "Il2CppAotPayload"
          assert_cpp_symbol "Il2CppAotReply"
          assert_cpp_symbol "PreserveMemoryPackClosures"

      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        if: failure()
        with:
          name: unity-ios-il2cpp-diagnostics
          path: |
            ./src/PulseRPC.Client.Unity/Logs/
            ./src/PulseRPC.Client.Unity/Builds/iOS/
          retention-days: 1

  actions-timeline:
    needs: [build-dotnet, run-tests, verify-packages, verify-samples, build-unity, build-unity-ios-il2cpp]
    if: always()
    permissions:
      actions: read
    uses: ChronosGames/Actions/.github/workflows/actions-timeline.yaml@main
    secrets: inherit
