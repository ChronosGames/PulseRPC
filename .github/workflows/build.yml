name: Build

on:
  push:
    branches:
      - main
      - release/**
    tags:
      - "!*" # not a tag push
    paths-ignore:
      - '**.md'
      - .github/**
      - docs/**
  pull_request:
    branches:
      - main
      - release/**
    paths-ignore:
      - '**.md'
      - .github/**
      - docs/**

jobs:
  build-dotnet:
    name: "Build .NET projects"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - run: dotnet build -c Debug ./PulseRPC.sln
      - run: dotnet build -c Release ./PulseRPC.sln
      # 收集构建产物供 Unity 使用
      - name: Collect build outputs
        run: |
          mkdir -p ./build-output
          find . -name "*.dll" -path "*/bin/Release/*" -exec cp {} ./build-output/ \; || true
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          name: build-output
          path: ./build-output/
          retention-days: 1

  run-tests:
    name: "Run tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - run: dotnet tool restore
      - run: dotnet retest -- -c Debug PulseRPC.sln
      - run: dotnet retest -- -c Release PulseRPC.sln


  build-unity:
    name: "Verify the integrity of files for Unity"
    needs: [build-dotnet]
    if: ${{ (github.event_name == 'push' && github.repository_owner == 'ChronosGames') || startsWith(github.event.pull_request.head.label, 'ChronosGames:') }}
    strategy:
      matrix:
        unity: ["2022.3.0f1"]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true

      # 从 build-dotnet job 下载构建产物
      - uses: ChronosGames/Actions/.github/actions/download-artifact@main
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          name: build-output
          path: ./build-output/

      # 构建 PulseRPC.Client 以生成 Unity 本地包结构
      - name: Build PulseRPC.Client for Unity local package
        uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - name: Create Unity local package structure
        run: |
          # 构建 PulseRPC.Client 的 Debug 配置以生成 .artifacts 目录结构
          dotnet build -c Debug ./src/PulseRPC.Client/PulseRPC.Client.csproj -f netstandard2.1

          # 验证 package.json 已生成
          if [ ! -f "./src/PulseRPC.Client/.artifacts/bin/debug_netstandard2.1/package.json" ]; then
            echo "Error: package.json not found at expected location"
            ls -la ./src/PulseRPC.Client/.artifacts/bin/ || echo "No .artifacts/bin directory"
            exit 1
          fi
          echo "Unity local package structure created successfully"
          ls -la ./src/PulseRPC.Client/.artifacts/bin/debug_netstandard2.1/

      # 复制必要的 DLL 到 Unity 项目
      - name: Copy DLLs to Unity project
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins
          find ./build-output -name "PulseRPC.*.dll" -exec cp {} ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins/ \; || true
          find ./build-output -name "MemoryPack.dll" -exec cp {} ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins/ \; || true
          find ./build-output -name "System.IO.Pipelines.dll" -exec cp {} ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins/ \; || true

      # execute scripts/Export Package
      - name: Build Unity (.unitypackage)
        uses: ChronosGames/Actions/.github/actions/unity-builder@main
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: src/PulseRPC.Client.Unity
          unityVersion: ${{ matrix.unity }}
          targetPlatform: StandaloneLinux64
          buildMethod: PackageExporter.Export

      # check meta files
      - uses: ChronosGames/Actions/.github/actions/check-metas@main
        with:
          directory: src/PulseRPC.Client.Unity

      # Store artifacts (仅用于调试)
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        if: failure()
        with:
          name: PulseRPC.Client.Unity.unitypackage
          path: ./src/PulseRPC.Client.Unity/PulseRPC.Client.Unity.unitypackage
          retention-days: 1

  actions-timeline:
    needs: [build-dotnet, run-tests, build-unity]
    if: always()
    permissions:
      actions: read
    uses: ChronosGames/Actions/.github/workflows/actions-timeline.yaml@main
    secrets: inherit
