name: Release

# ADD PERMISSIONS HERE (WORKFLOW-LEVEL):
permissions:
  actions: read
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "tag: git tag you want create. (sample 1.0.0)"
        required: true
      dry-run:
        description: "dry-run: true will never create relase/nuget."
        required: true
        default: false
        type: boolean

jobs:
  update-packagejson:
    permissions:
      actions: read   # 为了调用可复用工作流
      contents: write  # 为了允许推送更改到仓库
    uses: ChronosGames/Actions/.github/workflows/update-packagejson.yaml@main
    with:
      file-path: |
        ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/package.json
        ./src/PulseRPC.Client/package.json
        ./Directory.Build.props
      tag: ${{ inputs.tag }}
      dry-run: ${{ inputs.dry-run }}
      push-tag: false
      ref: ${{ github.ref }}

  build-dotnet:
    needs: [update-packagejson]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: echo ${{ needs.update-packagejson.outputs.sha }}
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.update-packagejson.outputs.sha }}
          lfs: true
      - uses: ./.github/actions/setup-dotnet
      # pack nuget
      - run: dotnet build -c Release ./PulseRPC.sln
      - run: dotnet pack -c Release ./PulseRPC.Packaging.slnf --no-build -o ./publish
      - name: Collect build outputs for Unity
        run: |
          set -euo pipefail
          dotnet build -c Release ./src/PulseRPC.Client.SourceGenerator.Unity/PulseRPC.Client.SourceGenerator.Unity.csproj
          mkdir -p ./build-output
          cp ./src/PulseRPC.Abstractions/bin/Release/netstandard2.1/PulseRPC.Abstractions.dll ./build-output/
          cp ./src/PulseRPC.Shared/bin/Release/netstandard2.1/PulseRPC.Shared.dll ./build-output/
          cp ./src/PulseRPC.Client/.artifacts/bin/release_netstandard2.1/PulseRPC.Client.dll ./build-output/
          unity_generator=./src/PulseRPC.Client.SourceGenerator.Unity/bin/Release/netstandard2.0/PulseRPC.Client.SourceGenerator.dll
          if grep -a -q "Microsoft.CodeAnalysis.Workspaces" "$unity_generator"; then
            echo "Unity source generator must not depend on Microsoft.CodeAnalysis.Workspaces"
            exit 1
          fi
          cp "$unity_generator" ./build-output/
      - name: Build versioned Unity UPM tarball
        shell: pwsh
        run: ./scripts/build-unity-upm.ps1 -Version '${{ inputs.tag }}'
      - name: Verify Unity UPM reproducibility
        shell: pwsh
        run: ./scripts/build-unity-upm.ps1 -Version '${{ inputs.tag }}' -SkipBuild -OutputDirectory artifacts/unity-upm-repro
      - name: Compare Unity UPM tarballs
        shell: bash
        run: cmp ./artifacts/unity-upm/*.tgz ./artifacts/unity-upm-repro/*.tgz
      - name: Verify NuGet packages
        shell: bash
        run: |
          version="$(sed -n 's:.*<VersionPrefix>\([^<]*\)</VersionPrefix>.*:\1:p' Directory.Build.props)"
          test -n "$version"
          test "$version" = "${{ inputs.tag }}"

          packages=(
            PulseRPC.Abstractions
            PulseRPC.Backplane.Redis
            PulseRPC.Client
            PulseRPC.Infrastructure
            PulseRPC.Infrastructure.Consul
            PulseRPC.Infrastructure.Etcd
            PulseRPC.Infrastructure.Kubernetes
            PulseRPC.Server
            PulseRPC.Shared
          )

          for package in "${packages[@]}"; do
            test -f "./publish/${package}.${version}.nupkg"
          done

          unzip -Z1 "./publish/PulseRPC.Backplane.Redis.${version}.nupkg" |
            grep -Fx "lib/net10.0/PulseRPC.Backplane.Redis.dll"
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: nuget
          path: ./publish/
          retention-days: 1
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: build-output
          path: ./build-output/
          retention-days: 1
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: unity-upm
          path: ./artifacts/unity-upm/
          retention-days: 1

  build-unity:
    needs: [update-packagejson, build-dotnet]
    strategy:
      matrix:
        unity: ["2022.3.62f3"]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - run: echo ${{ needs.update-packagejson.outputs.sha }}
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.update-packagejson.outputs.sha }}
          lfs: true


      - uses: ChronosGames/Actions/.github/actions/download-artifact@main
        with:
          name: unity-upm
          path: ./unity-upm/

      - name: Materialize an isolated UPM closure for legacy unitypackage export
        shell: bash
        run: |
          set -euo pipefail
          project=./src/PulseRPC.Client.Unity
          package_assets="$project/Assets/Scripts/PulseRPC.Client.Unity"
          manifest="$project/Packages/manifest.json"

          rsync -a --delete ./unity-upm/package/ "$package_assets/"

          # PulseRPC and MemoryPack come only from the staged UPM closure. Keep UGUI
          # solely for the legacy RuntimeUnitTestToolkit scripts in this export project.
          rm -rf "$project/Assets/Packages" "$project/Assets/Packages.meta"
          jq '.dependencies = {"com.unity.ugui": "1.0.0"}' "$manifest" > "$manifest.tmp"
          mv "$manifest.tmp" "$manifest"
          rm -f "$project/Packages/packages-lock.json"

          if grep -Fq 'com.chronosgames.pulserpc.client.internal' "$manifest"; then
            echo "Release Unity project still references the development-only PulseRPC package."
            exit 1
          fi

          duplicate_dlls=$(find "$project/Assets" -type f -name '*.dll' -printf '%f\n' | sort | uniq -d)
          if [ -n "$duplicate_dlls" ]; then
            echo "Release Unity project contains duplicate managed assemblies:"
            echo "$duplicate_dlls"
            exit 1
          fi

      # Execute scripts: Export Package
      # /opt/Unity/Editor/Unity -quit -batchmode -nographics -silent-crashes -logFile -projectPath . -executeMethod PackageExporter.Export
      - name: Build Unity (.unitypackage)
        uses: ChronosGames/Actions/.github/actions/unity-builder@main
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_LICENSE == '' && secrets.UNITY_SERIAL || '' }}
          UNITY_PACKAGE_VERSION: ${{ inputs.tag }}
        with:
          projectPath: src/PulseRPC.Client.Unity
          unityVersion: ${{ matrix.unity }}
          targetPlatform: StandaloneLinux64
          buildMethod: PackageExporter.Export

      - name: Stage Unity release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release-assets
          versioned=./src/PulseRPC.Client.Unity/PulseRPC.Client.Unity.${{ inputs.tag }}.unitypackage
          unversioned=./src/PulseRPC.Client.Unity/PulseRPC.Client.Unity.unitypackage
          if [ -f "$versioned" ]; then
            unitypackage="$versioned"
          else
            test -f "$unversioned"
            unitypackage="$unversioned"
          fi
          cp "$unitypackage" ./release-assets/PulseRPC.Client.Unity.${{ inputs.tag }}.unitypackage
          cp ./unity-upm/*.tgz ./release-assets/
          cp ./unity-upm/*.tgz.sha256 ./release-assets/

      # Store artifacts.
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: PulseRPC.Client.Unity.unitypackage
          path: ./release-assets/
          retention-days: 1

  # release
  create-release:
    permissions:
      actions: read   # 为了调用可复用工作流
      contents: write  # 为了允许推送更改到仓库
    needs: [update-packagejson, build-dotnet, build-unity]
    uses: ChronosGames/Actions/.github/workflows/create-release.yaml@main
    with:
      commit-id: ${{ needs.update-packagejson.outputs.sha }}
      dry-run: ${{ inputs.dry-run }}
      tag: ${{ inputs.tag }}
      release-upload: true
      release-asset-path: |
        ./PulseRPC.Client.Unity.unitypackage/*.unitypackage
        ./PulseRPC.Client.Unity.unitypackage/*.tgz
        ./PulseRPC.Client.Unity.unitypackage/*.tgz.sha256

  publish-nuget:
    needs: [build-dotnet, create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nuget
          path: ./nuget
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - uses: ChronosGames/Actions/.github/actions/publish-nuget@main
        with:
          nuget-user: ${{ vars.NUGET_USER }}
          dry-run: ${{ inputs.dry-run }}

  cleanup:
    if: ${{ needs.update-packagejson.outputs.is-branch-created == 'true' }}
    needs: [build-dotnet, build-unity, update-packagejson]
    uses: ChronosGames/Actions/.github/workflows/clean-packagejson-branch.yaml@main
    with:
      branch: ${{ needs.update-packagejson.outputs.branch-name }}
