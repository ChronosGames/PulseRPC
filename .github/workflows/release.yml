name: Release

# ADD PERMISSIONS HERE (WORKFLOW-LEVEL):
permissions:
  actions: read
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "tag: git tag you want create. (sample 1.0.0)"
        required: true
      dry-run:
        description: "dry-run: true will never create relase/nuget."
        required: true
        default: false
        type: boolean

jobs:
  update-packagejson:
    permissions:
      actions: read   # 为了调用可复用工作流
      contents: write  # 为了允许推送更改到仓库
    uses: ChronosGames/Actions/.github/workflows/update-packagejson.yaml@main
    with:
      file-path: |
        ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/package.json
        ./Directory.Build.props
      tag: ${{ inputs.tag }}
      dry-run: ${{ inputs.dry-run }}
      push-tag: false
      ref: ${{ github.ref }}

  build-dotnet:
    needs: [update-packagejson]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: echo ${{ needs.update-packagejson.outputs.sha }}
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-packagejson.outputs.sha }}
          lfs: true
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      # pack nuget
      - run: dotnet build -c Release ./PulseRPC.sln
      - run: dotnet pack -c Release ./PulseRPC.Packaging.slnf --no-build -o ./publish
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: nuget
          path: ./publish/
          retention-days: 1

  build-unity:
    needs: [update-packagejson, build-dotnet]
    strategy:
      matrix:
        unity: ["2022.3.0f1"]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update-packagejson.outputs.sha }}
          lfs: true

      # 从 build-dotnet job 下载 DLL 文件
      - uses: ChronosGames/Actions/.github/actions/download-artifact@main
        with:
          name: nuget
          path: ./publish/

      # 复制必要的 DLL 到 Unity 项目
      - name: Copy DLLs to Unity project
        run: |
          mkdir -p ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins
          find ./publish -name "PulseRPC.*.dll" -exec cp {} ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins/ \;
          find ./publish -name "MemoryPack.dll" -exec cp {} ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins/ \; || true
          find ./publish -name "System.IO.Pipelines.dll" -exec cp {} ./src/PulseRPC.Client.Unity/Assets/Scripts/PulseRPC.Client.Unity/Plugins/ \; || true

      # 使用 Unity Builder 构建包
      - name: Build Unity (.unitypackage)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_PACKAGE_VERSION: ${{ inputs.tag }}
        with:
          projectPath: src/PulseRPC.Client.Unity
          unityVersion: ${{ matrix.unity }}
          targetPlatform: StandaloneLinux64
          buildMethod: PackageExporter.Export

      - uses: ./.github/actions/check-metas # check meta files
        with:
          directory: src/PulseRPC.Client.Unity

      # Store artifacts.
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: PulseRPC.Client.Unity.unitypackage
          path: ./src/PulseRPC.Client.Unity/PulseRPC.Client.Unity*.unitypackage
          retention-days: 1

  # release
  create-release:
    permissions:
      actions: read   # 为了调用可复用工作流
      contents: write  # 为了允许推送更改到仓库
    needs: [update-packagejson, build-dotnet, build-unity]
    uses: ChronosGames/Actions/.github/workflows/create-release.yaml@main
    with:
      commit-id: ${{ needs.update-packagejson.outputs.sha }}
      dry-run: ${{ inputs.dry-run }}
      tag: ${{ inputs.tag }}
      nuget-push: true
      release-format: '{0}'
    secrets: inherit

  cleanup:
    if: ${{ needs.update-packagejson.outputs.is-branch-created == 'true' }}
    needs: [build-dotnet, build-unity, update-packagejson]
    uses: ChronosGames/Actions/.github/workflows/clean-packagejson-branch.yaml@main
    with:
      branch: ${{ needs.update-packagejson.outputs.branch-name }}
