name: Build Canary

on:
  push:
    branches:
      - main
      - release/**
    tags:
      - "!*" # not a tag push
    paths-ignore:
      - '**.md'
      - .github/**
      - docs/**
      - samples/**
  workflow_dispatch:
  schedule:
    # 每天凌晨 2 点构建 canary 版本（UTC + 8 时间）
    - cron: '0 10 * * *'

env:
  DISABLE_NETFX_TARGET_BUILD: 1
  BUILD_CONFIG: Release

jobs:
  canary-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ChronosGames/Actions/.github/actions/setup-dotnet@main
      - run: echo "PULSERPC_VERSION=ci-$(date '+%Y%m%d-%H%M%S')+${GITHUB_SHA:0:6}" >> $GITHUB_ENV
      - run: echo "PULSERPC_VERSION=${PULSERPC_VERSION}"
      # build
      - run: dotnet build -c ${{ env.BUILD_CONFIG }} ./PulseRPC.sln
      # pack
      - run: dotnet pack -c ${{ env.BUILD_CONFIG }} ./PulseRPC.Packaging.slnf --no-build -p:VersionSuffix=${PULSERPC_VERSION} -o ./publish
      - uses: ChronosGames/Actions/.github/actions/upload-artifact@main
        with:
          name: nuget
          path: ./publish/
          retention-days: 1

  canary-push:
    needs: [canary-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NUGET_CREDENTIALPROVIDER_SESSIONTOKENCACHE_ENABLED: true
    steps:
      - name: Load secrets
        id: op-load-secret
        uses: 1password/load-secrets-action@13f58eec611f8e5db52ec16247f58c508398f3e6 # v3.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_PUBLIC }}
          VSS_NUGET_EXTERNAL_FEED_ENDPOINTS_PUBLIC_CANARY: "op://${{ vars.OP_VAULT_ACTIONS_PUBLIC }}/VSS_NUGET_EXTERNAL_FEED_ENDPOINTS_PUBLIC_CANARY/credential"
      - uses: ChronosGames/Actions/.github/actions/download-artifact@main
      # Upload to NuGet
      - run: echo "VSS_NUGET_EXTERNAL_FEED_ENDPOINTS=${FEED_ENDPOINTS}" >> $GITHUB_ENV
        env:
          FEED_ENDPOINTS: ${{ steps.op-load-secret.outputs.VSS_NUGET_EXTERNAL_FEED_ENDPOINTS_PUBLIC_CANARY }}
      - run: wget -qO- https://raw.githubusercontent.com/Microsoft/artifacts-credprovider/master/helpers/installcredprovider.sh | bash
      - run: dotnet nuget push "./nuget/*.nupkg" --skip-duplicate -s https://pkgs.dev.azure.com/chronosgames/Public/_packaging/Canary-Build/nuget/v2 -k AzureDevOps

  actions-timeline:
    needs: [canary-build, canary-push]
    uses: ChronosGames/Actions/.github/workflows/actions-timeline.yaml@main
    secrets: inherit
