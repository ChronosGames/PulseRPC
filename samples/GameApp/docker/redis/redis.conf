# Redis 配置文件 - GameApp 开发环境

# 基础配置
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# 内存配置
maxmemory 512mb
maxmemory-policy allkeys-lru

# 持久化配置
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# AOF 配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 日志配置
loglevel notice
logfile ""

# 网络配置
tcp-nodelay yes
timeout 0

# 客户端配置
maxclients 10000

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 事件通知
notify-keyspace-events "Ex"

# 安全配置
# requirepass dev_password (通过命令行参数设置)

# 数据库数量
databases 16

# 虚拟内存 (已废弃但保留配置)
vm-enabled no

# 集群配置 (开发环境不启用)
# cluster-enabled no

# GameApp 特定配置
# 键空间设计:
# session:{userId} - 用户会话 (TTL: 24小时)
# player:{playerId} - 玩家信息 (TTL: 1小时)
# world:{worldId} - 世界状态 (TTL: 10分钟)
# battle:{battleId} - 战斗数据 (TTL: 2小时)
# config:* - 配置数据 (TTL: 根据类型)
