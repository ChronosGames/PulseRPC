# MongoDB 配置文件
# 参考: https://docs.mongodb.com/manual/reference/configuration-options/

# ============================================
# 网络配置
# ============================================
net:
  port: 27017
  bindIp: 0.0.0.0  # 允许所有 IP 连接（生产环境应限制）
  maxIncomingConnections: 1000

# ============================================
# 存储配置
# ============================================
storage:
  dbPath: /data/db
  # 存储引擎（WiredTiger）
  engine: wiredTiger
  wiredTiger:
    engineConfig:
      # 缓存大小（默认为系统内存的 50%）
      cacheSizeGB: 1
      # 使用压缩
      journalCompressor: snappy
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

# ============================================
# 日志配置
# ============================================
systemLog:
  destination: file
  path: /data/db/mongod.log
  logAppend: true
  # 日志级别: 0=quiet, 1=normal, 2=verbose
  verbosity: 0
  component:
    index:
      verbosity: 1  # 索引操作日志

# ============================================
# 性能配置
# ============================================
operationProfiling:
  # 慢查询分析
  mode: slowOp
  slowOpThresholdMs: 100  # 超过 100ms 的查询会被记录

# ============================================
# 安全配置（生产环境必须启用）
# ============================================
security:
  authorization: enabled

# ============================================
# 副本集配置（可选，用于高可用）
# ============================================
# replication:
#   replSetName: "pulserpc-rs"

# ============================================
# 其他配置
# ============================================
setParameter:
  # 启用诊断数据收集
  diagnosticDataCollectionEnabled: true
  # 慢查询日志采样率
  slowOpSampleRate: 1.0
