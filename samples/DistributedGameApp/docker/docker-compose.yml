version: '3.8'

services:
  # ==================== 基础设施服务 ====================

  # MongoDB - 数据库
  mongodb:
    image: mongo:latest
    container_name: distributedgame-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: game_accounts
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - distributedgame-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Consul - 服务注册与发现
  consul:
    image: hashicorp/consul:latest
    container_name: distributedgame-consul
    restart: unless-stopped
    ports:
      - "8500:8500"    # HTTP API
      - "8600:8600/udp" # DNS
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
    volumes:
      - consul_data:/consul/data
    networks:
      - distributedgame-network
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - 缓存和队列
  redis:
    image: redis:latest
    container_name: distributedgame-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - distributedgame-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== LoginServer 实例 ====================

  login-server-1:
    build:
      context: ../../..
      dockerfile: samples/DistributedGameApp/src/DistributedGameApp.LoginServer/Dockerfile
    container_name: login-server-1
    restart: unless-stopped
    depends_on:
      consul:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    ports:
      - "5000:5000"  # HTTP API
    environment:
      - ServerIdentity__ServiceType=LoginServer
      - ServerIdentity__NodeId=1
      - ServerIdentity__NodeName=LoginServer-Node1
      - ServerIdentity__MaxCapacity=10000
      - Network__External__Host=login-server-1
      - Network__External__Enabled=true
      - Network__External__Tcp__Port=5000
      - Network__External__Tcp__Enabled=true
      - Kestrel__Endpoints__Http__Url=http://0.0.0.0:5000
      - Jwt__SecretKey=DistributedGameApp_Secret_Key_2025_Must_Be_At_Least_32_Characters_Long
      - Jwt__Issuer=DistributedGameApp.LoginServer
      - Jwt__Audience=DistributedGameApp.Client
      - Jwt__AccessTokenExpirationMinutes=60
      - Jwt__RefreshTokenExpirationDays=30
      - Consul__Address=http://consul:8500
      - MongoDB__ConnectionString=mongodb://admin:password123@mongodb:27017
    networks:
      - distributedgame-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  login-server-2:
